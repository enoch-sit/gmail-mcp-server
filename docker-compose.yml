# Gmail MCP Server — runtime
#
# Usage:
#   docker compose up
#
# Credentials are supplied via environment variables (recommended for Docker)
# OR by mounting a credentials/ directory that contains credentials.json + token.json.
#
# Environment variables take precedence over files.

version: '3.9'

services:
  gmail-mcp:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: gmail-mcp-server:latest
    container_name: gmail-mcp-server

    # ── Supply credentials via environment variables (recommended) ──────────
    # Copy .env.example → .env and fill in your values, or set them directly.
    environment:
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID:-}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET:-}
      - GMAIL_REFRESH_TOKEN=${GMAIL_REFRESH_TOKEN:-}
      - GMAIL_REDIRECT_URI=${GMAIL_REDIRECT_URI:-http://localhost:3000/oauth/callback}
      - PRIVACY_ORCHESTRATOR_URL=${PRIVACY_ORCHESTRATOR_URL:-http://privacy-orchestrator:8100/redact}

    # ── Alternative: mount credentials files ────────────────────────────────
    # Uncomment to persist token.json / credentials.json across container restarts.
    volumes:
      - ./credentials:/app/credentials

    # MCP servers use stdio — keep stdin open
    stdin_open: true
    tty: true

    restart: unless-stopped

  # Optional Redis for token management + session state (start with --profile privacy)
  redis:
    profiles: ["privacy"]
    image: redis:7-alpine
    container_name: gmail-mcp-redis
    command:
      - redis-server
      - --appendonly
      - "yes"
      - --appendfsync
      - "everysec"
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    restart: unless-stopped

  # Optional local vLLM runtime (start with --profile privacy)
  vllm:
    profiles: ["privacy"]
    image: vllm/vllm-openai:latest
    container_name: local-vllm
    command:
      - --model
      - ${VLLM_MODEL:-mistralai/Mistral-7B-Instruct-v0.2}
      - --host
      - 0.0.0.0
      - --port
      - "8000"
    ports:
      - "8000:8000"
    restart: unless-stopped

  # Optional local privacy orchestrator (CrewAI swarm + deterministic fallback)
  privacy-orchestrator:
    profiles: ["privacy"]
    build:
      context: ./privacy-orchestrator
      dockerfile: Dockerfile
    container_name: privacy-orchestrator
    environment:
      - PORT=8100
      - VLLM_BASE_URL=http://vllm:8000/v1
      - VLLM_MODEL=${VLLM_MODEL:-mistralai/Mistral-7B-Instruct-v0.2}
      - USE_CREWAI_SWARM=1
    depends_on:
      - vllm
    ports:
      - "8100:8100"
    restart: unless-stopped

volumes:
  redis_data:
